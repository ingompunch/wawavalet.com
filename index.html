<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>와와 주차대행 - 인천공항 실내·실외 안심 주차 프리미엄 발렛</title>
    <script>
      // Early error handler to ignore specific browser extension insertion errors (e.g. MetaMask, Rabby etc.)
      (function() {
        var suppressError = function(msg) {
          return msg && (msg.indexOf('ethereum') !== -1 || msg.indexOf('Cannot redefine property: ethereum') !== -1);
        };
        window.addEventListener('error', function(event) {
          if (suppressError(event.message)) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);
        window.addEventListener('unhandledrejection', function(event) {
          var reasonMsg = (event.reason && event.reason.message) || '';
          if (suppressError(reasonMsg)) {
            event.preventDefault();
          }
        });
        // Override window.onerror as a backup
        var originalOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          var msg = String(message || (error && error.message) || '');
          if (suppressError(msg)) {
            return true;
          }
          if (originalOnError) {
            return originalOnError.apply(this, arguments);
          }
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
